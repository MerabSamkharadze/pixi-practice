<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NEON SNAKE · PIXI Arcade</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #05050d;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav.game-nav {
            width: 100%;
            background: rgba(13, 13, 32, 0.92);
            border-bottom: 2px solid rgba(255, 0, 255, 0.35);
            box-shadow: 0 4px 30px rgba(255, 0, 255, 0.12);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }
        nav.game-nav .brand {
            color: #ff00ff;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 6px;
            text-shadow: 0 0 12px rgba(255, 0, 255, 0.6);
        }
        nav.game-nav .tabs {
            display: flex;
            gap: 12px;
        }
        nav.game-nav a {
            text-decoration: none;
            color: #a0a4b8;
            padding: 10px 22px;
            border-radius: 999px;
            border: 1px solid rgba(160, 164, 184, 0.25);
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 3px;
            transition: all 0.18s ease;
        }
        nav.game-nav a:hover {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.7);
            transform: translateY(-1px);
        }
        nav.game-nav a.asteroid.active {
            color: #0a0a1a;
            background: linear-gradient(135deg, #00ffff, #66ffff);
            border-color: #00ffff;
            box-shadow:
                0 0 14px rgba(0, 255, 255, 0.7),
                0 0 32px rgba(0, 255, 255, 0.35);
        }
        nav.game-nav a.snake.active {
            color: #0a0a1a;
            background: linear-gradient(135deg, #ff00ff, #ff66ff);
            border-color: #ff00ff;
            box-shadow:
                0 0 14px rgba(255, 0, 255, 0.7),
                0 0 32px rgba(255, 0, 255, 0.35);
        }
        canvas {
            margin: 24px 0;
            display: block;
            box-shadow:
                0 0 40px rgba(0, 255, 255, 0.25),
                0 0 80px rgba(255, 0, 255, 0.18);
            border-radius: 6px;
        }
    </style>
</head>
<body>
<nav class="game-nav">
    <div class="brand">PIXI · ARCADE</div>
    <div class="tabs">
        <a href="index.html" class="asteroid">ASTEROID SHOOTER</a>
        <a href="snake.html" class="snake active">NEON SNAKE</a>
    </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-filters@5.3.0/dist/browser/pixi-filters.js"></script>
<script src="snake.js"></script>
</body>
</html>
